# Security headers applied to every response (Netlify applies these globally,
# including static assets). HSTS is preserved to match the existing config.
[[headers]]
  for = "/*"
  [headers.values]
    X-Frame-Options = "DENY"
    X-Content-Type-Options = "nosniff"
    Referrer-Policy = "strict-origin-when-cross-origin"
    Permissions-Policy = "camera=(), microphone=(), geolocation=(), browsing-topics=()"
    Strict-Transport-Security = "max-age=31536000; includeSubDomains"
    # Pragmatic CSP: the app self-hosts fonts (next/font), uses inline styles and
    # Next's inline hydration/JSON-LD scripts, and makes no third-party requests.
    # 'unsafe-inline' is required for those inline scripts/styles without a nonce
    # pipeline; everything else is locked to same-origin.
    Content-Security-Policy = "default-src 'self'; base-uri 'self'; form-action 'self'; frame-ancestors 'none'; object-src 'none'; img-src 'self' data:; script-src 'self' 'unsafe-inline'; style-src 'self' 'unsafe-inline'; font-src 'self'; connect-src 'self'"
